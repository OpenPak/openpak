app-id: io.github.baronsmv.linux-rt-upscaler
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
base: io.qt.PySide.BaseApp
base-version: '6.10'
command: upscale-gui
finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=ipc
  - --filesystem=xdg-pictures

modules:
  - python-dependencies.json

  - name: linux-rt-upscaler
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --no-deps --prefix=/app --no-build-isolation .
      - install -Dm644 io.github.baronsmv.linux-rt-upscaler.appdata.xml /app/share/metainfo/io.github.baronsmv.linux-rt-upscaler.appdata.xml
      - install -Dm644 io.github.baronsmv.linux-rt-upscaler.desktop /app/share/applications/io.github.baronsmv.linux-rt-upscaler.desktop
      - install -Dm644 io.github.baronsmv.linux-rt-upscaler.svg /app/share/icons/hicolor/scalable/apps/io.github.baronsmv.linux-rt-upscaler.svg
    sources:
      - type: git
        url: https://github.com/baronsmv/linux-rt-upscaler.git
        tag: v1.0.0.post3
        commit: 59a760748c988308ba2e44f5b151ec1d2028f18a
      - type: file
        path: io.github.baronsmv.linux-rt-upscaler.appdata.xml
      - type: file
        path: io.github.baronsmv.linux-rt-upscaler.desktop
      - type: file
        path: io.github.baronsmv.linux-rt-upscaler.svg

cleanup-commands:
  - /app/cleanup-BaseApp.sh
