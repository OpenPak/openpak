app-id: com.mobidevices.mobidevices
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
    - org.freedesktop.Sdk.Extension.rust-stable
command: mobidevices

finish-args:
    - --share=network
    - --share=ipc
    - --socket=fallback-x11
    - --socket=wayland
    - --device=dri
    - --socket=pulseaudio
    - --talk-name=org.freedesktop.Notifications

modules:
    - name: mobidevices
      buildsystem: simple
      build-options:
          append-path: /usr/lib/sdk/rust-stable/bin
          env:
              CARGO_HOME: /run/build/mobidevices/cargo
              CARGO_NET_OFFLINE: 'true'
      build-commands:
          - cargo --offline fetch --manifest-path src-tauri/Cargo.toml --locked --verbose
          - 'sed -i ''s|"identifier": "com.mobidevices.desktop"|"identifier": "com.mobidevices.mobidevices"|'' src-tauri/tauri.conf.json'
          - cargo --offline build --manifest-path src-tauri/Cargo.toml --release --locked
          - sh linux/install-assets.sh src-tauri/target/release/mobidevices-app /app/bin mobidevices linux/mobidevices.desktop.in /app/share com.mobidevices.mobidevices.desktop mobidevices com.mobidevices.mobidevices src-tauri/icons com.mobidevices.mobidevices linux/com.mobidevices.mobidevices.metainfo.xml com.mobidevices.mobidevices.metainfo.xml
          - install -Dm644 LICENSE /app/share/licenses/com.mobidevices.mobidevices/LICENSE
      sources:
          - type: git
            url: https://github.com/MobiDevices/Application.git
            tag: 'v1.0.2'
            commit: '0a7fbdcb3b877ada8cbb0d41c0d1bc1820417f4e'
          - cargo-sources.json
