id: io.github.raspbeguy.Terrain
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang
build-options:
  prepend-path: /usr/lib/sdk/ccache/bin
  append-path: /usr/lib/sdk/golang/bin
  env:
    GOFLAGS: -mod=vendor
    GOTOOLCHAIN: local
    GOCACHE: /run/build/terrain/.gocache
command: terrain
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - '*.la'
  - '*.a'
finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --talk-name=org.freedesktop.secrets
modules:
  - name: terrain
    buildsystem: meson
    sources:
      - type: archive
        url: https://github.com/raspbeguy/terrain/archive/refs/tags/v0.0.2.tar.gz
        sha256: a30f977ab9687758129feafb34b28483a08c868e53f2554c4486a57e56337936
      - go.mod.yml
