app-id: io.github.abdallah_moh1.Amethyst

runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk

sdk-extensions:
  - org.freedesktop.Sdk.Extension.node24

base: org.electronjs.Electron2.BaseApp
base-version: "25.08"

command: run.sh
separate-locales: false

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --share=network
  # Needed to save and load notes for a picked accessible dirs (Like Vaults)
  - --filesystem=~/.amethyst
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons

build-options:
  append-path: /usr/lib/sdk/node24/bin
  env:
    NPM_CONFIG_LOGLEVEL: info

modules:
  - name: amethyst
    buildsystem: simple
    build-options:
      env:
        XDG_CACHE_HOME: /run/build/amethyst/flatpak-node/cache
        npm_config_cache: /run/build/amethyst/flatpak-node/npm-cache
        npm_config_offline: "true"
    build-commands:
      - npm install --offline
      - |
        . ./flatpak-node/electron-builder-arch-args.sh
        npm run build:electron -- $ELECTRON_BUILDER_ARCH_ARGS --linux --dir
      - cp -a dist/linux*unpacked /app/main
      - install -Dm755 -t /app/bin/ run.sh
      - install -Dm644 flatpak/io.github.abdallah_moh1.Amethyst.metainfo.xml /app/share/metainfo/io.github.abdallah_moh1.Amethyst.metainfo.xml
      - install -Dm644 flatpak/io.github.abdallah_moh1.Amethyst.desktop /app/share/applications/io.github.abdallah_moh1.Amethyst.desktop
      - install -Dm644 assets/icons/icon.svg /app/share/icons/hicolor/scalable/apps/io.github.abdallah_moh1.Amethyst.svg
    sources:
      - generated-sources.json
      - type: git
        url: https://github.com/abdallah-moh1/amethyst
        commit: 5eeb6beb32137ecd93c35448bcae1c6cd5da7808
      - type: file
        path: run.sh
