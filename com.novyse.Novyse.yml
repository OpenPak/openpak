app-id: com.novyse.Novyse
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: "24.08"
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22
command: novyse
separate-locales: false

finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --share=ipc
  - --share=network
  - --device=dri
  - --socket=pulseaudio
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=com.canonical.AppMenu.Registrar

build-options:
  append-path: /usr/lib/sdk/node22/bin
  env:
    XDG_CACHE_HOME: /run/build/novyse/flatpak-node/cache
    npm_config_cache: /run/build/novyse/flatpak-node/npm-cache
    npm_config_offline: "true"

modules:
  - name: novyse
    buildsystem: simple
    build-commands:
      - npm ci --offline --no-audit --no-fund
      - npm run build:web

      - cd desktop && npm ci --offline --no-audit --no-fund && npm run build
      - cd desktop && ./node_modules/.bin/electron-builder --linux dir --config electron-builder.config.ts

      - cp -R desktop/dist/linux-unpacked /app/main

      - mkdir -p /app/bin
      - install -Dm755 desktop/flathub/run.sh /app/bin/novyse

      - mkdir -p /app/share/icons/hicolor/scalable/apps
      - cp assets/images/logo.svg /app/share/icons/hicolor/scalable/apps/com.novyse.Novyse.svg || cp assets/images/logo-novyse.png /app/share/icons/hicolor/scalable/apps/com.novyse.Novyse.png || true

      - install -Dm644 desktop/flathub/com.novyse.Novyse.desktop /app/share/applications/com.novyse.Novyse.desktop
      - install -Dm644 desktop/flathub/com.novyse.Novyse.metainfo.xml /app/share/metainfo/com.novyse.Novyse.metainfo.xml
    sources:
      - type: git
        url: https://github.com/Novyse/novyse.git
        tag: v1.1.0-20260614.0
      - flatpak-node-dependencies.json
