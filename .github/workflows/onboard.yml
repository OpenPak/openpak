name: Onboard app

# On merge into `new-pr`: for each app manifest in the merge, create (or refresh)
# the per-app repo OpenPak/<app-id> as a MANIFEST-ONLY repo (no README, no
# workflows — Flathub-faithful), point its About at the app page, copy the shared
# label set, invite the submitter as maintainer, and dispatch the central build.

on:
  push:
    branches: [new-pr]
  workflow_dispatch:
    inputs:
      app_id:
        description: Re-onboard a single app id manually
        required: false

permissions:
  contents: read

jobs:
  onboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect manifests
        id: d
        run: |
          git config --global --add safe.directory "$PWD"
          if [ -n "${{ github.event.inputs.app_id }}" ]; then
            mans=$(ls "${{ github.event.inputs.app_id }}".* 2>/dev/null | head -1)
          else
            mans=$(git diff --name-only HEAD^ HEAD \
                   | grep -E '^[A-Za-z0-9-]+(\.[A-Za-z0-9-]+)+\.(ya?ml|json)$' || true)
          fi
          [ -z "$mans" ] && echo "No app manifests to onboard."
          { echo "apps<<EOF"; echo "$mans"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - name: Create, seed & build per-app repos
        if: steps.d.outputs.apps != ''
        env:
          GH_TOKEN: ${{ secrets.OPENPAK_BOT_PAT }}
          ORG: OpenPak
          INTAKE: ${{ github.repository }}
        run: |
          set -euo pipefail
          while IFS= read -r manifest; do
            [ -z "$manifest" ] && continue
            appid="${manifest%.*}"
            page="https://openpak.org/apps/$appid"
            echo "::group::Onboard $appid"

            # 1. create repo if missing; always set About -> app page
            if ! gh repo view "$ORG/$appid" >/dev/null 2>&1; then
              gh repo create "$ORG/$appid" --public --description "$appid" --homepage "$page" >/dev/null
              echo "created $ORG/$appid"
            fi
            gh repo edit "$ORG/$appid" --description "$appid" --homepage "$page" >/dev/null || true

            # 2. labels: copy shared set, drop GitHub defaults
            gh label list --repo "$INTAKE" --json name,color,description | jq -c '.[]' | while read -r l; do
              n=$(jq -r .name <<<"$l"); c=$(jq -r .color <<<"$l"); d=$(jq -r '.description // ""' <<<"$l")
              gh label create "$n" --repo "$ORG/$appid" --color "$c" --description "$d" --force >/dev/null 2>&1 || true
            done
            for x in bug documentation "good first issue" "help wanted" question wontfix; do
              gh label delete "$x" --repo "$ORG/$appid" --yes >/dev/null 2>&1 || true
            done

            # 3. seed MANIFEST ONLY (no README, no workflows)
            tmp=$(mktemp -d); cp "$manifest" "$tmp/"
            ( cd "$tmp"
              git init -q -b main
              git config user.name "openpak-bot"; git config user.email "bot@openpak.org"
              git add -A && git commit -qm "Add $appid"
              git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/$ORG/$appid.git"
              git push -q -f origin main )
            echo "seeded $ORG/$appid (manifest only)"

            # 4. invite the PR submitter as maintainer
            author=$(gh api "repos/$INTAKE/commits/${{ github.sha }}/pulls" --jq '.[0].user.login' 2>/dev/null || true)
            if [ -n "$author" ] && [ "$author" != "null" ]; then
              gh api -X PUT "repos/$ORG/$appid/collaborators/$author" -f permission=push >/dev/null \
                && echo "invited $author" || echo "invite failed for $author"
            fi

            # 5. dispatch the central build
            gh workflow run build-app.yml --repo "$INTAKE" -f app_id="$appid" \
              && echo "dispatched build for $appid"
            echo "::endgroup::"
          done <<< "${{ steps.d.outputs.apps }}"
