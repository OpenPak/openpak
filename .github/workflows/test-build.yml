name: Test build (PR gate)

# Submissions: fork, branch named after the app id, add the manifest at the REPO
# ROOT as <app-id>.{yaml,yml,json}, open a PR against `new-pr`.
# This builds + lints it and uploads an installable test bundle. No publishing.

on:
  pull_request:
    branches: [new-pr]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Identify submitted manifest
        id: m
        run: |
          git config --global --add safe.directory "$PWD"
          git fetch origin "${{ github.base_ref }}" --depth=1 || true
          f=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" \
              | grep -E '^[A-Za-z0-9-]+(\.[A-Za-z0-9-]+)+\.(ya?ml|json)$' | head -1)
          if [ -z "$f" ]; then
            echo "::error::No app manifest found at repo root. Add <app-id>.yaml at the root."
            exit 1
          fi
          appid="${f%.*}"
          echo "manifest=$f"   >> "$GITHUB_OUTPUT"
          echo "appid=$appid"  >> "$GITHUB_OUTPUT"
          echo "Building $f"

      - name: Build & lint
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: ${{ steps.m.outputs.appid }}.flatpak
          manifest-path: ${{ steps.m.outputs.manifest }}
          cache-key: fb-${{ github.event.pull_request.head.sha }}
          run-tests: false

      - name: Upload test bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.m.outputs.appid }}
          path: ${{ steps.m.outputs.appid }}.flatpak
          if-no-files-found: warn
