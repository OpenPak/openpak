name: Build app

# Central build service (Flathub-faithful). Per-app repos hold ONLY the manifest;
# this workflow builds any app and publishes it to dl.openpak.org.
#
# Triggered by:
#   - onboard.yml (workflow_dispatch) right after a per-app repo is created
#   - repository_dispatch {type: build-app, client_payload.app_id} on per-app push
#     (wired via an org webhook -> dispatcher; see deploy/ for the receiver)
#   - manual: gh workflow run build-app.yml -f app_id=<app-id>

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: Reverse-DNS app id (the per-app repo name)
        required: true
  repository_dispatch:
    types: [build-app]

permissions:
  contents: read

concurrency:
  group: openpak-publish        # one publisher mutates the shared repo at a time
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    env:
      APP_ID: ${{ github.event.inputs.app_id || github.event.client_payload.app_id }}
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          repository: OpenPak/${{ github.event.inputs.app_id || github.event.client_payload.app_id }}
          token: ${{ secrets.OPENPAK_BOT_PAT }}

      - name: Find manifest
        id: m
        run: |
          f=$(ls *.yaml *.yml *.json 2>/dev/null \
              | grep -E '^[A-Za-z0-9-]+(\.[A-Za-z0-9-]+)+\.(ya?ml|json)$' | head -1)
          if [ -z "$f" ]; then echo "::error::no manifest in $APP_ID"; exit 1; fi
          echo "manifest=$f" >> "$GITHUB_OUTPUT"

      - name: Setup runtimes remote
        run: |
          flatpak remote-add --user --if-not-exists \
            flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Setup SSH
        run: |
          install -m700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Build into a local repo
        run: |
          flatpak-builder --user --disable-rofiles-fuse --force-clean \
            --install-deps-from=flathub \
            --repo=local-repo --default-branch=stable \
            builddir "${{ steps.m.outputs.manifest }}"

      - name: Integrate, sign, publish
        run: |
          export GNUPGHOME="$RUNNER_TEMP/gnupg"; install -m700 -d "$GNUPGHOME"
          printf '%s\n' "${{ secrets.OPENPAK_GPG_KEY }}" | gpg --batch --import
          mkdir -p repo
          rsync -az "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/" repo/ || true
          ostree --repo=repo pull-local local-repo
          flatpak build-update-repo repo \
            --title="Openpak" --generate-static-deltas \
            --gpg-sign="${{ secrets.OPENPAK_GPG_KEYID }}" --gpg-homedir="$GNUPGHOME"
          rsync -az --delete --exclude='tmp/' \
            repo/ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Summary
        run: echo "Published $APP_ID -> https://dl.openpak.org/repo/"
